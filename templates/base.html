<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AccessRoute{% endblock %}</title>
    <!-- Google Fonts - reliable, always works -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <div class="brand-icon">♿</div>
            <span class="brand-text">Access<strong>Route</strong></span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Home</a>
            <a href="/map" class="nav-link {% if request.endpoint == 'map_page' %}active{% endif %}">Map</a>
            <a href="/report" class="nav-link {% if request.endpoint == 'report_page' %}active{% endif %}">Report Issue</a>
            <a href="/about" class="nav-link {% if request.endpoint == 'about_page' %}active{% endif %}">About</a>
        </div>
        <button class="nav-toggle" onclick="toggleMenu()">☰</button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <a href="/" class="mobile-link">Home</a>
        <a href="/map" class="mobile-link">Map</a>
        <a href="/report" class="mobile-link">Report Issue</a>
        <a href="/about" class="mobile-link">About</a>
    </div>

    <main>{% block content %}{% endblock %}</main>

    <footer class="footer">
        <div class="footer-inner">
            <span>© 2025 AccessRoute — Making cities navigable for everyone.</span>
            <div class="footer-links">
                <a href="/map">Explore Map</a>
                <a href="/report">Report Issue</a>
                <a href="/about">About</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
